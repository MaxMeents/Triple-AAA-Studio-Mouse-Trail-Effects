<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Triple-A Effect Browser</title>
<style>
  :root {
    --bg: #05060b;
    --fg: #e6eaff;
    --accent: #00e6ff;
    --accent2: #ff2bd6;
    --panel: #0b0e1a;
    --border: #1c2236;
  }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--fg);
    font-family: 'Segoe UI', system-ui, sans-serif; height:100%; overflow:hidden; }
  header {
    padding: 10px 16px; border-bottom:1px solid var(--border);
    display:flex; gap:16px; align-items:center; background:var(--panel);
    position:sticky; top:0; z-index:10;
  }
  header h1 { margin:0; font-size:15px; letter-spacing:2px; color:var(--accent); font-weight:700; }
  header input {
    background: #111524; color: var(--fg); border:1px solid var(--border);
    padding: 6px 10px; border-radius: 4px; min-width: 260px; font-size: 13px;
  }
  header .hint { margin-left:auto; color: #7a86aa; font-size: 12px; }
  header .active {
    background: #141a2e; padding: 4px 10px; border-radius:4px; font-size:12px;
    border: 1px solid var(--border);
  }
  header .active b { color: var(--accent); }
  #container { height: calc(100vh - 50px); overflow-y: auto; padding: 14px 16px; }
  .section-title {
    font-size: 11px; letter-spacing: 3px; color: var(--accent2);
    margin: 14px 4px 6px; text-transform: uppercase; font-weight: 700;
  }
  .section-title.trail { color: var(--accent); }
  .cat { margin-bottom: 10px; }
  .cat h3 {
    font-size: 10px; letter-spacing: 2px; color: #8892b8;
    margin: 6px 4px; text-transform: uppercase; font-weight: 600;
  }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 8px; }
  .fx-btn {
    background: #0f1424; color: var(--fg); border: 1px solid var(--border);
    padding: 10px 12px; text-align:left; cursor: pointer; border-radius: 4px;
    font-size: 12px; font-family: inherit; transition: border-color 0.1s, background 0.1s;
  }
  .fx-btn:hover { border-color: var(--accent); }
  .fx-btn .num { display:block; font-size: 10px; color: #6478a8; letter-spacing:1px; margin-bottom:2px; }
  .fx-btn.active { border-color: var(--accent); background: #1a2348; }
  .fx-btn.active .num { color: var(--accent); }
  .fx-btn.click-type .num::before { content: 'CLICK · '; color: var(--accent2); }
  .fx-btn.trail-type .num::before { content: 'TRAIL · '; color: var(--accent); }
</style>
</head>
<body>
  <header>
    <h1>TRIPLE-A FX BROWSER</h1>
    <input id="search" type="text" placeholder="Filter by name or category…" />
    <div class="active">Active: <b id="active-name">—</b></div>
    <span class="hint">Scroll wheel cycles · click to activate · selection saved</span>
  </header>
  <div id="container"></div>

  <script>
    const container = document.getElementById('container');
    const searchEl  = document.getElementById('search');
    const activeEl  = document.getElementById('active-name');

    let all = [];       // [{type, id, name, category}]
    let buttons = [];   // DOM nodes in display order
    let activeIdx = 0;

    function render(list, filter) {
      container.innerHTML = '';
      buttons = [];
      const term = (filter || '').trim().toLowerCase();

      // Two sections: Trail, then Click
      ['trail', 'click'].forEach(type => {
        const of = list.filter(e => e.type === type &&
          (!term || e.name.toLowerCase().includes(term) || e.category.toLowerCase().includes(term)));
        if (!of.length) return;
        const h = document.createElement('div');
        h.className = 'section-title ' + type;
        h.textContent = type === 'trail' ? 'Mouse Trail Effects' : 'Click Effects';
        container.appendChild(h);

        const groups = {};
        for (const eff of of) (groups[eff.category] ||= []).push(eff);
        Object.keys(groups).sort().forEach(cat => {
          const cEl = document.createElement('div');
          cEl.className = 'cat';
          const ch = document.createElement('h3'); ch.textContent = cat; cEl.appendChild(ch);
          const grid = document.createElement('div'); grid.className = 'grid'; cEl.appendChild(grid);
          groups[cat].forEach(eff => {
            const b = document.createElement('button');
            b.className = 'fx-btn ' + (eff.type === 'click' ? 'click-type' : 'trail-type');
            b.dataset.type = eff.type;
            b.dataset.id   = eff.id;
            b.innerHTML = `<span class="num">${eff.category}</span>${eff.name}`;
            b.addEventListener('click', () => selectByButton(b));
            grid.appendChild(b);
            buttons.push(b);
          });
          container.appendChild(cEl);
        });
      });
      updateActive();
    }

    function updateActive() {
      buttons.forEach((b, i) => b.classList.toggle('active', i === activeIdx));
      const b = buttons[activeIdx];
      activeEl.textContent = b ? (b.dataset.type.toUpperCase() + ' · ' + b.textContent.replace(/^[A-Z ]+/, '').trim()) : '—';
      if (b) b.scrollIntoView({ block: 'nearest' });
    }

    function selectByIndex(i) {
      if (!buttons.length) return;
      activeIdx = ((i % buttons.length) + buttons.length) % buttons.length;
      const b = buttons[activeIdx];
      updateActive();
      window.overlayBridge && window.overlayBridge.selectEffect &&
        window.overlayBridge.selectEffect({ type: b.dataset.type, id: b.dataset.id });
    }

    function selectByButton(b) {
      const i = buttons.indexOf(b);
      if (i >= 0) selectByIndex(i);
    }

    // Wheel cycle across ALL visible effects.
    let wheelCool = 0;
    window.addEventListener('wheel', e => {
      if (e.target === searchEl) return;
      e.preventDefault();
      const now = performance.now();
      if (now < wheelCool) return;
      wheelCool = now + 60;
      selectByIndex(activeIdx + (e.deltaY > 0 ? 1 : -1));
    }, { passive: false });

    // Arrow-key navigation.
    window.addEventListener('keydown', e => {
      if (document.activeElement === searchEl) return;
      if (e.key === 'ArrowDown' || e.key === 'ArrowRight') { e.preventDefault(); selectByIndex(activeIdx + 1); }
      else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') { e.preventDefault(); selectByIndex(activeIdx - 1); }
    });

    searchEl.addEventListener('input', () => render(all, searchEl.value));

    // Receive the effect list (from hidden renderer via the preload bridge).
    window.overlayBridge.onEffectList((lists) => {
      all = [...(lists.trail || []), ...(lists.click || [])];
      render(all, searchEl.value);
    });

    // Request the list.
    window.overlayBridge.requestEffects();
  </script>
</body>
</html>
