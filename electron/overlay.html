<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    cursor: none;
  }
  canvas {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    background: transparent;
    pointer-events: none;
    display: block;
  }
  canvas.hidden { display: none; }
</style>
</head>
<body>
  <!-- Trail engine GPU canvas (PixiJS WebGL) -->
  <canvas id="fxGpu"></canvas>
  <!-- Trail engine stroke overlay (Canvas 2D, used by a few effects' onFrame) -->
  <canvas id="fx"></canvas>
  <!-- Click engine canvas (PixiJS WebGL) -->
  <canvas id="fxCanvas"></canvas>

  <script>window.__transparent = true;</script>

  <!-- PixiJS must load before either GPU engine -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@7.4.0/dist/pixi.min.js"></script>

  <!-- Trail engine + effects -->
  <script src="../js/engine_gpu.js"></script>

  <!-- Install the trail-spawn customization wrapper BEFORE the effect files
       run, because each effect file destructures `spawn` at load time
       (`const { spawn } = Engine;`) — so swapping Engine.spawn afterwards
       would be invisible to them. -->
  <script>
    window.__trailCustom = { intensity:1, size:1, speed:1, life:1, alpha:1 };
    (function(){
      const orig = Engine.spawn;
      Engine.spawn = function(p){
        const c = window.__trailCustom;
        if (c.intensity < 1 && Math.random() > c.intensity) return;
        if (p.size  != null) p.size  *= c.size;
        if (p.vx    != null) p.vx    *= c.speed;
        if (p.vy    != null) p.vy    *= c.speed;
        if (p.life  != null) p.life  *= c.life;
        if (p.alpha != null) p.alpha *= c.alpha;
        orig.call(this, p);
        let extra = c.intensity - 1;
        while (extra > 0) {
          if (extra >= 1 || Math.random() < extra) orig.call(this, Object.assign({}, p));
          extra -= 1;
        }
      };
    })();
  </script>

  <script src="../js/effects/_helpers.js"></script>
  <script src="../js/effects/fire.js"></script>
  <script src="../js/effects/tech.js"></script>
  <script src="../js/effects/magic.js"></script>
  <script src="../js/effects/nature.js"></script>
  <script src="../js/effects/cosmic.js"></script>
  <script src="../js/effects/weapons.js"></script>
  <script src="../js/effects/liquid.js"></script>
  <script src="../js/effects/weather.js"></script>
  <script src="../js/effects/horror.js"></script>
  <script src="../js/effects/music.js"></script>
  <script src="../js/effects/geometry.js"></script>
  <script src="../js/effects/glitch.js"></script>
  <script src="../js/effects/alchemy.js"></script>
  <script src="../js/effects/arcade.js"></script>
  <script src="../js/effects/royal.js"></script>

  <!-- Click engine (PixiJS already loaded above) -->
  <script src="../Triple AAA Mouse click Effects/js/particle.js"></script>
  <script src="../Triple AAA Mouse click Effects/js/effects.js"></script>

  <script>
  (function(){
    const fxTrail = document.getElementById('fx');
    const fxClick = document.getElementById('fxCanvas');
    const clickEngine = new FX.Engine(fxClick);
    clickEngine.app.ticker.stop(); // start paused; enable below

    let state = {
      trailEnabled: true, clickEnabled: true,
      trailId: null, trailId2: null, trailId3: null,
      trailEnabled2: false, trailEnabled3: false,
      clickId: null,
      trailCustom: { intensity:1, size:1, speed:1, life:1, alpha:1 },
      clickCustom: { intensity:1, size:1, speed:1, life:1, alpha:1 }
    };
    let activeClick = null;
    let activeTrailIds = [null, null, null];

    // The trail spawn wrapper was already installed before the effect files
    // loaded — we just need to feed it the current values via window.__trailCustom.
    // The click engine uses live method dispatch (eng.spawn(...)) so wrapping
    // it here — after the click engine exists — is safe.
    function applyMul(p, c) {
      if (p.size  != null) p.size  *= c.size;
      if (p.vx    != null) p.vx    *= c.speed;
      if (p.vy    != null) p.vy    *= c.speed;
      if (p.life  != null) p.life  *= c.life;
      if (p.alpha != null) p.alpha *= c.alpha;
    }
    const origClickSpawn = clickEngine.spawn.bind(clickEngine);
    clickEngine.spawn = function(p) {
      const c = state.clickCustom;
      if (c.intensity < 1 && Math.random() > c.intensity) return null;
      applyMul(p, c);
      const ret = origClickSpawn(p);
      let extra = c.intensity - 1;
      while (extra > 0) {
        if (extra >= 1 || Math.random() < extra) origClickSpawn(Object.assign({}, p));
        extra -= 1;
      }
      return ret;
    };

    function applyState() {
      // Trail canvas — hide when disabled and pause its rAF loop to save CPU.
      fxTrail.classList.toggle('hidden', !state.trailEnabled);
      window.__paused = !state.trailEnabled;
      if (!state.trailEnabled) Engine.clear();

      // Click canvas — stop the PIXI ticker when disabled (saves GPU).
      fxClick.classList.toggle('hidden', !state.clickEnabled);
      if (state.clickEnabled) clickEngine.app.ticker.start();
      else                    { clickEngine.app.ticker.stop(); clickEngine.clear(); }

      // Effect selection — three independent slots.
      // Slot 0 always reflects state.trailId (the canonical selection).
      // Slots 1 and 2 are turned on/off via state.trailEnabled{2,3}.
      const desired = [
        state.trailId,
        state.trailEnabled2 ? state.trailId2 : null,
        state.trailEnabled3 ? state.trailId3 : null
      ];
      for (let s = 0; s < 3; s++) {
        if (desired[s] !== activeTrailIds[s]) {
          activeTrailIds[s] = desired[s];
          Engine.setEffect(desired[s], s);
        }
      }
      if (state.clickId) {
        const eff = FX_EFFECTS.find(e => String(e.id) === String(state.clickId));
        if (eff) activeClick = eff;
      }
    }

    // Report effect list (both types) to main for the tray menu.
    const trailList = Engine.effects.map(e => ({
      type: 'trail', id: e.id, name: e.name, category: e.category || 'Uncategorized'
    }));
    const clickList = FX_EFFECTS.map(e => ({
      type: 'click', id: String(e.id), name: e.name, category: e.category || 'Uncategorized'
    }));
    window.overlayBridge.reportEffects({ trail: trailList, click: clickList });

    window.overlayBridge.onState((s) => {
      if (!s) return;
      state = Object.assign(state, s);
      // Keep the pre-effects trail wrapper's shared state in sync with
      // whatever main broadcast for the currently-selected trail effect.
      if (state.trailCustom) window.__trailCustom = state.trailCustom;
      applyState();
    });

    window.overlayBridge.onClear(() => {
      Engine.clear();
      clickEngine.clear();
    });

    window.overlayBridge.onClickAt((pt) => {
      if (!state.clickEnabled) return;
      const eff = activeClick || FX_EFFECTS[0];
      try { eff.run(clickEngine, pt.x, pt.y); } catch (err) { console.error(err); }
    });
  })();
  </script>
</body>
</html>
