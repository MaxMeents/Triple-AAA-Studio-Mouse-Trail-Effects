<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Customize Effect</title>
<style>
  :root {
    --bg: #0a0d17;
    --panel: #121628;
    --fg: #e6eaff;
    --muted: #7a86aa;
    --border: #23294a;
    --accent: #00e6ff;
    --accent2: #ff2bd6;
  }
  html, body { margin:0; padding:0; background:var(--bg); color:var(--fg);
    font-family: 'Segoe UI', system-ui, sans-serif; height:100%; overflow:hidden; }
  body { display: flex; flex-direction: column; }
  header {
    padding: 14px 18px; border-bottom:1px solid var(--border); background:var(--panel);
  }
  header .type {
    display:inline-block; font-size:10px; letter-spacing:3px;
    padding: 2px 8px; border-radius: 3px; margin-right: 10px;
    color: var(--bg); font-weight: 700;
  }
  header .type.trail { background: var(--accent); }
  header .type.click { background: var(--accent2); }
  header h1 { margin: 4px 0 0; font-size:17px; font-weight:600; }
  .body { flex: 1; overflow-y: auto; padding: 14px 18px; }
  .row { margin-bottom: 18px; }
  .row .lbl { display:flex; justify-content:space-between; align-items:baseline;
    font-size: 12px; letter-spacing: 1px; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px; }
  .row .lbl b { color: var(--fg); font-size: 14px; font-weight: 600; letter-spacing: 0; }
  .row .lbl .val { color: var(--accent); font-family: 'Consolas', monospace; font-size:13px; }
  input[type=range] {
    width: 100%; -webkit-appearance: none; background: transparent; margin: 0; height: 24px;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 4px; background: var(--border); border-radius: 2px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px; border-radius: 50%; background: var(--accent);
    margin-top: -6px; border: 2px solid var(--bg); cursor: grab;
  }
  input[type=range]:active::-webkit-slider-thumb { cursor: grabbing; }
  footer {
    padding: 12px 18px; border-top: 1px solid var(--border); background:var(--panel);
    display: flex; gap: 10px; justify-content: space-between;
  }
  button {
    background: #1a2040; color: var(--fg); border: 1px solid var(--border);
    padding: 8px 16px; font-size: 13px; cursor: pointer; border-radius: 4px;
    font-family: inherit;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #0a0d17; border-color: var(--accent); font-weight: 600; }
  button.primary:hover { background: #44efff; }
  .live {
    font-size: 11px; color: var(--muted); align-self: center;
    letter-spacing: 1px; text-transform: uppercase;
  }
  .live b { color: var(--accent); }
</style>
</head>
<body>
  <header>
    <span class="type" id="type-tag">TRAIL</span>
    <span id="meta" style="color:var(--muted); font-size:12px;">Effect</span>
    <h1 id="name">—</h1>
  </header>

  <div class="body" id="body">
    <!-- sliders injected -->
  </div>

  <footer>
    <span class="live">Live preview <b>ON</b></span>
    <div style="display:flex; gap:10px;">
      <button id="reset">Reset</button>
      <button class="primary" id="done">Done</button>
    </div>
  </footer>

  <script>
    const FIELDS = [
      { key: 'intensity', label: 'Intensity',     min: 0.1, max: 3.0, step: 0.05,
        help: 'Particle count multiplier' },
      { key: 'size',      label: 'Particle Size', min: 0.1, max: 3.0, step: 0.05,
        help: 'Visual size multiplier' },
      { key: 'speed',     label: 'Speed',         min: 0.1, max: 3.0, step: 0.05,
        help: 'Velocity multiplier' },
      { key: 'life',      label: 'Lifetime',      min: 0.3, max: 3.0, step: 0.05,
        help: 'How long particles live' },
      { key: 'alpha',     label: 'Opacity',       min: 0.1, max: 1.0, step: 0.05,
        help: 'Particle transparency' }
    ];

    const bodyEl    = document.getElementById('body');
    const nameEl    = document.getElementById('name');
    const metaEl    = document.getElementById('meta');
    const typeTagEl = document.getElementById('type-tag');

    let current = null; // { type, id, name, values, defaults }
    const inputs = {};

    function fmt(v) { return Number(v).toFixed(2); }

    function renderForm(data) {
      current = data;
      if (!data) {
        bodyEl.innerHTML = '<p style="color:var(--muted)">No effect selected.</p>';
        return;
      }
      nameEl.textContent = data.name;
      metaEl.textContent = data.type === 'click' ? 'Click Effect' : 'Trail Effect';
      typeTagEl.textContent = data.type === 'click' ? 'CLICK' : 'TRAIL';
      typeTagEl.className = 'type ' + data.type;
      document.title = 'Customize: ' + data.name;

      bodyEl.innerHTML = '';
      FIELDS.forEach(f => {
        const v = (data.values && data.values[f.key] != null) ? data.values[f.key] : data.defaults[f.key];
        const row = document.createElement('div'); row.className = 'row';
        row.innerHTML = `
          <div class="lbl">
            <span><b>${f.label}</b>  <span style="font-size:11px; text-transform:none; letter-spacing:0; color:var(--muted);">— ${f.help}</span></span>
            <span class="val" id="val-${f.key}">${fmt(v)}×</span>
          </div>
          <input type="range" min="${f.min}" max="${f.max}" step="${f.step}" value="${v}" id="in-${f.key}" />
        `;
        bodyEl.appendChild(row);
        const input = row.querySelector('input');
        const vEl   = row.querySelector('.val');
        inputs[f.key] = input;
        input.addEventListener('input', () => {
          vEl.textContent = fmt(input.value) + '×';
          pushValues();
        });
      });
    }

    function collectValues() {
      const out = {};
      FIELDS.forEach(f => { out[f.key] = parseFloat(inputs[f.key].value); });
      return out;
    }

    function pushValues() {
      if (!current) return;
      window.overlayBridge.customizeSet({
        type: current.type,
        id:   current.id,
        values: collectValues()
      });
    }

    document.getElementById('reset').addEventListener('click', () => {
      if (!current) return;
      window.overlayBridge.customizeReset({ type: current.type, id: current.id });
    });
    document.getElementById('done').addEventListener('click', () => window.close());

    window.overlayBridge.onCustomizeData((data) => renderForm(data));
    window.overlayBridge.customizeRequest();
  </script>
</body>
</html>
